version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: castra
    main: ./main.go
    binary: castra
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: castra
    name_template: "castra_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: amangsingh
    name: castra
  draft: false
  prerelease: auto

brews:
  - name: castra
    repository:
      owner: amangsingh
      name: homebrew-castra
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for castra version {{ .Tag }}"
    homepage: "https://github.com/amangsingh/castra"
    description: >
      Castra is a structured project management CLI for autonomous AI agents.
      It enforces role boundaries, audit trails, and sprint-driven workflows.
    license: "MIT"
    test: |
      system "#{bin}/castra", "--help"
    install: |
      bin.install "castra"
